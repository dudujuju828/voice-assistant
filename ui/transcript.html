<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Assistant — Transcript</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c222b;
    --line: #2a313c;
    --text: #e6edf3;
    --muted: #8b97a6;
    --accent: #5a6eff;
    --recording: #eb4646;
    --processing: #ebb43c;
    --speaking: #50c878;
    --error: #c83c3c;
    --idle: #56606e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  a { color: inherit; }

  /* Sidebar — browsable history */
  aside {
    width: 290px;
    flex: 0 0 290px;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
  }
  .brand {
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
    font-weight: 600;
    letter-spacing: .2px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand small { color: var(--muted); font-weight: 400; font-size: 12px; }
  .history { overflow-y: auto; flex: 1; }
  .conv {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .conv:hover { background: var(--panel-2); }
  .conv.active { background: var(--panel-2); box-shadow: inset 3px 0 0 var(--accent); }
  .conv .title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv .meta { color: var(--muted); font-size: 12px; margin-top: 3px; display: flex; gap: 8px; align-items: center; }
  .tag {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px;
    padding: 1px 6px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted);
  }
  .tag.coding { color: #b59bff; border-color: #3d3566; }
  .tag.live { color: var(--speaking); border-color: #2c5e44; }
  .empty-history { padding: 18px; color: var(--muted); font-size: 13px; }

  /* Main panel */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  header {
    padding: 14px 22px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
  }
  .status { display: flex; align-items: center; gap: 9px; font-weight: 500; }
  .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--idle); }
  .status.recording .dot { background: var(--recording); }
  .status.processing .dot { background: var(--processing); }
  .status.speaking .dot { background: var(--speaking); }
  .status.error .dot { background: var(--error); }
  .status.recording .dot,
  .status.processing .dot,
  .status.speaking .dot { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .45; transform: scale(.82); } }
  .head-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .head-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
    border-radius: 7px; padding: 5px 10px; font-size: 12.5px; cursor: pointer; text-decoration: none;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.hidden { display: none; }

  .stream { overflow-y: auto; flex: 1; padding: 22px clamp(16px, 6vw, 80px); }
  .turn { margin-bottom: 22px; }
  .bubble { max-width: 760px; padding: 11px 15px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
  .row { display: flex; margin-bottom: 8px; }
  .row.user { justify-content: flex-end; }
  .row.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .row.assistant .bubble { background: var(--panel); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .row .who { font-size: 11px; color: var(--muted); margin: 0 4px 3px; align-self: flex-end; }
  .row.assistant .bubble.err { border-color: var(--error); color: #ffb4b4; }
  .typing .bubble { color: var(--muted); }
  .typing .dots span {
    display: inline-block; width: 6px; height: 6px; margin-right: 3px; border-radius: 50%;
    background: var(--muted); animation: blink 1.2s infinite both;
  }
  .typing .dots span:nth-child(2) { animation-delay: .2s; }
  .typing .dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: .25; } 40% { opacity: 1; } }
  .placeholder { color: var(--muted); text-align: center; margin-top: 18vh; }
  .codebanner {
    margin: 0 0 18px; padding: 8px 14px; border: 1px solid var(--line);
    border-left: 3px solid #6b5bd6; border-radius: 8px; color: var(--muted); font-size: 13px;
  }
  .codebanner code { color: #cdbfff; }
</style>
</head>
<body>
  <aside>
    <div class="brand">🎙️ Voice Assistant <small>transcripts</small></div>
    <div class="history" id="history"></div>
  </aside>
  <main>
    <header>
      <div class="status idle" id="status"><span class="dot"></span><span id="status-label">Idle</span></div>
      <div class="head-title" id="head-title">No conversation selected</div>
      <div class="head-actions">
        <button class="btn hidden" id="live-btn" onclick="goLive()">↩ Back to live</button>
        <a class="btn hidden" id="dl-md" download>Markdown</a>
        <a class="btn hidden" id="dl-txt" download>Text</a>
        <a class="btn hidden" id="dl-json" download>JSON</a>
      </div>
    </header>
    <div class="stream" id="stream"></div>
  </main>

<script>
"use strict";
const STATUS = {
  idle:       { label: "Idle",        cls: "idle" },
  recording:  { label: "Listening…",  cls: "recording" },
  processing: { label: "Thinking…",   cls: "processing" },
  speaking:   { label: "Speaking…",   cls: "speaking" },
  error:      { label: "Error",       cls: "error" },
};

let state = null;          // latest live snapshot from /api/events
let selectedId = null;     // a past conversation the user opened (null = follow live)
let viewConv = null;       // fetched conversation for selectedId
let prevStatus = null;

const $ = (id) => document.getElementById(id);
const esc = (s) => (s == null ? "" : String(s)).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

function fmtTime(ts) {
  if (!ts) return "";
  const d = new Date(ts * 1000);
  const today = new Date();
  const sameDay = d.toDateString() === today.toDateString();
  return sameDay
    ? d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
    : d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
      d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

// Which conversation is on screen, and are we following the live one?
function following() { return !selectedId || (state && selectedId === state.active_id); }
function currentConv() { return following() ? (state && state.conversation) : viewConv; }

function renderStatus() {
  const s = (state && STATUS[state.status]) || STATUS.idle;
  const el = $("status");
  el.className = "status " + s.cls;
  $("status-label").textContent = (state && state.status === "error" && state.message) ? state.message : s.label;
}

function turnHTML(turn) {
  let html = `<div class="turn">`;
  html += `<div class="row user"><div class="bubble">${esc(turn.user)}</div></div>`;
  const assistant = (turn.assistant || "").trim();
  if (assistant) {
    html += `<div class="row assistant"><div class="bubble">${esc(assistant)}</div></div>`;
  } else if (turn.state === "error") {
    html += `<div class="row assistant"><div class="bubble err">${esc(turn.error || "Something went wrong.")}</div></div>`;
  }
  html += `</div>`;
  return html;
}

function typingHTML(label) {
  return `<div class="turn typing"><div class="row assistant"><div class="bubble">` +
    `${esc(label)} <span class="dots"><span></span><span></span><span></span></span>` +
    `</div></div></div>`;
}

function formingUserHTML(text) {
  return `<div class="turn"><div class="row user"><div class="bubble">${esc(text)}` +
    `<span class="dots" style="margin-left:6px"><span></span><span></span><span></span></span>` +
    `</div></div></div>`;
}

function renderMain() {
  const conv = currentConv();
  const live = following();

  // Header: title + download links
  if (conv && conv.id) {
    const title = conv.turns && conv.turns.length ? conv.turns.find((t) => t.user)?.user || "Conversation" : "Conversation";
    $("head-title").textContent = (live ? "" : "") + title;
    for (const [id, fmt] of [["dl-md", "md"], ["dl-txt", "txt"], ["dl-json", "json"]]) {
      const a = $(id);
      a.href = `/api/conversations/${conv.id}/download?format=${fmt}`;
      a.classList.remove("hidden");
    }
  } else {
    $("head-title").textContent = live ? "Live conversation" : "No conversation selected";
    ["dl-md", "dl-txt", "dl-json"].forEach((id) => $(id).classList.add("hidden"));
  }
  $("live-btn").classList.toggle("hidden", following());

  // Body
  const stream = $("stream");
  let html = "";
  if (conv && conv.kind === "coding" && conv.path) {
    html += `<div class="codebanner">Coding session · <code>${esc(conv.path)}</code></div>`;
  }
  const turns = (conv && conv.turns) || [];
  for (const turn of turns) html += turnHTML(turn);

  if (live && state) {
    const last = turns[turns.length - 1];
    if (state.status === "recording") {
      html += formingUserHTML(state.partial || "Listening…");
    } else if (state.status === "processing") {
      if (state.partial) html += formingUserHTML(state.partial);
      else if (last && last.state === "pending") html += typingHTML("Thinking");
      else html += typingHTML("Thinking");
    } else if (state.status === "speaking" && last && !(last.assistant || "").trim()) {
      html += typingHTML("Speaking");
    }
  }

  if (!html) {
    html = `<div class="placeholder">No conversation yet.<br>Hold the hotkey and speak — it'll appear here live.</div>`;
  }

  // Keep the view pinned to the newest message when following live.
  const atBottom = stream.scrollHeight - stream.scrollTop - stream.clientHeight < 80;
  stream.innerHTML = html;
  if (live && atBottom) stream.scrollTop = stream.scrollHeight;
}

function renderHistory(list) {
  const box = $("history");
  if (!list.length) {
    box.innerHTML = `<div class="empty-history">No conversations yet.</div>`;
    return;
  }
  const activeViewId = following() ? (state && state.active_id) : selectedId;
  box.innerHTML = list.map((c) => {
    const isLive = state && c.id === state.active_id;
    const tags = [];
    if (c.kind === "coding") tags.push(`<span class="tag coding">code</span>`);
    if (isLive) tags.push(`<span class="tag live">live</span>`);
    return `<div class="conv ${c.id === activeViewId ? "active" : ""}" onclick="select('${c.id}')">` +
      `<div class="title">${esc(c.title)}</div>` +
      `<div class="meta">${tags.join("")}<span>${c.turn_count} turn${c.turn_count === 1 ? "" : "s"}</span>` +
      `<span>· ${fmtTime(c.updated_at)}</span></div></div>`;
  }).join("");
}

async function loadHistory() {
  try {
    const res = await fetch("/api/conversations");
    const data = await res.json();
    renderHistory(data.conversations || []);
  } catch (e) { /* offline / server gone */ }
}

async function select(id) {
  if (state && id === state.active_id) { goLive(); return; }
  selectedId = id;
  try {
    const res = await fetch("/api/conversations/" + encodeURIComponent(id));
    viewConv = res.ok ? await res.json() : null;
  } catch (e) { viewConv = null; }
  renderMain();
  loadHistory();
}

function goLive() {
  selectedId = null;
  viewConv = null;
  renderMain();
  loadHistory();
}

function onSnapshot(snap) {
  state = snap;
  renderStatus();
  // Re-render the open conversation when we're following the live one.
  if (following()) renderMain();
  // Refresh the history list on turn boundaries (not on every partial word).
  if (snap.status !== prevStatus) {
    prevStatus = snap.status;
    loadHistory();
  }
}

function connect() {
  const ev = new EventSource("/api/events");
  ev.onmessage = (e) => {
    try { onSnapshot(JSON.parse(e.data)); } catch (err) { /* ignore */ }
  };
  ev.onerror = () => { /* EventSource auto-reconnects */ };
}

// Initial paint, then go live.
fetch("/api/state").then((r) => r.json()).then((s) => { state = s; prevStatus = s.status; renderStatus(); renderMain(); }).catch(() => {});
loadHistory();
connect();
</script>
</body>
</html>
